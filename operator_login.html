<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Operator Login</title>
<style>
body { font-family: 'Roboto', sans-serif; text-align: center; padding: 50px; background: #f4f6f8; }
h2 { color: #2c3e50; }
input, button { padding: 10px; font-size: 16px; margin: 10px; border-radius: 5px; }
button { cursor: pointer; background-color: #3498db; color: white; border: none; transition: 0.3s; }
button:hover { background-color: #2980b9; }
</style>
</head>
<body>
<h2>Connexion Opérateur</h2>
<label>Nom d'utilisateur :</label>
<input type="text" id="username" placeholder="Ex: John"><br>
<button onclick="loginOperator()">Valider</button><br>

<button onclick="goBack()">Page précédente</button>
<button onclick="goHome()">Page initiale</button>

<script>
function loginOperator(){
    window.location.href = "operator_search.html";
}

function goBack(){ window.history.back(); }
function goHome(){ window.location.href="index.html"; }
</script>
</body>
</html>
