<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Admin — Hirschmann Automotive</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --navy:    #08192e;
  --navy-md: #0c2240;
  --navy-lt: #112c50;
  --blue:    #1b50a0;
  --blue-lt: #2a6fcc;
  --red:     #c0272d;
  --red-lt:  #e8454b;
  --red-dk:  #8e1a1e;
  --red-dim: rgba(192,39,45,0.15);
  --white:   #ffffff;
  --off:     rgba(255,255,255,0.5);
  --faint:   rgba(255,255,255,0.05);
  --border:  rgba(255,255,255,0.09);
  --success: #22c55e;
  --mono:    'DM Mono', monospace;
  --sans:    'Barlow', sans-serif;
  --cond:    'Barlow Condensed', sans-serif;
  --radius:  8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--navy);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ─── SCANLINES ─── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.035) 2px, rgba(0,0,0,0.035) 4px);
  pointer-events: none; z-index: 1;
}

/* ─── GRID ─── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    repeating-linear-gradient(0deg,  transparent, transparent 59px, rgba(255,255,255,0.022) 59px, rgba(255,255,255,0.022) 60px),
    repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.022) 59px, rgba(255,255,255,0.022) 60px);
  pointer-events: none; z-index: 0;
}

/* ─── GLOWS ─── */
.glow {
  position: fixed; border-radius: 50%;
  filter: blur(110px); pointer-events: none; z-index: 0;
}
.glow-blue {
  width: 650px; height: 650px;
  top: -200px; left: -200px;
  background: radial-gradient(circle, rgba(27,80,160,0.14), transparent 70%);
  animation: drift 14s ease-in-out infinite alternate;
}
.glow-red {
  width: 500px; height: 500px;
  bottom: -180px; right: -150px;
  background: radial-gradient(circle, rgba(192,39,45,0.1), transparent 70%);
  animation: drift 10s ease-in-out infinite alternate-reverse;
}
.glow-center {
  width: 300px; height: 300px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(27,80,160,0.07), transparent 70%);
  animation: pulse-c 6s ease-in-out infinite;
}
@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(25px, 18px) scale(1.1); }
}
@keyframes pulse-c {
  0%,100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
  50%      { opacity: 1;   transform: translate(-50%,-50%) scale(1.2); }
}

/* ─── TOP BAR ─── */
.top-bar {
  height: 4px;
  background: linear-gradient(90deg, var(--red-dk), var(--red), var(--red-lt), var(--red), var(--red-dk));
  background-size: 300% 100%;
  animation: bar-ride 4s linear infinite;
  position: relative; z-index: 100; flex-shrink: 0;
}
@keyframes bar-ride {
  0%   { background-position: 0% 0%; }
  100% { background-position: 300% 0%; }
}

/* ─── HEADER ─── */
header {
  position: relative; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 48px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,25,46,0.85);
  backdrop-filter: blur(14px);
  flex-shrink: 0; gap: 16px;
}

.header-logo img {
  height: 38px;
  filter: brightness(0) invert(1);
  opacity: 0.9; display: block;
}
.logo-fallback {
  display: none;
  font-family: var(--cond); font-size: 18px; font-weight: 800;
  letter-spacing: 2px; color: var(--white);
}

.header-meta { text-align: right; }
.app-label {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--red-lt); opacity: 0.85;
}
.app-name {
  font-family: var(--cond); font-size: 21px; font-weight: 800;
  color: var(--white); letter-spacing: 2px; line-height: 1.1;
}

/* ─── CENTER WRAP ─── */
.center-wrap {
  flex: 1; position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
}

/* ─── LOGIN CARD ─── */
.login-card {
  width: 100%; max-width: 430px;
  background: rgba(12,34,64,0.75);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  backdrop-filter: blur(16px);
  opacity: 0; transform: translateY(24px) scale(0.98);
  animation: card-appear 0.55s cubic-bezier(.22,1,.36,1) forwards 0.1s;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
}
@keyframes card-appear {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Card top accent */
.card-accent {
  height: 3px;
  background: linear-gradient(90deg, var(--red-dk), var(--red), var(--red-lt), var(--red-lt));
  background-size: 200% 100%;
  animation: accent-slide 3s linear infinite;
}
@keyframes accent-slide {
  0%   { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}

.card-body { padding: 40px 44px 44px; }

/* Security badge */
.security-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 3px; padding: 4px 10px;
  margin-bottom: 24px;
}
.badge-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 4px var(--red);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; } 50% { opacity: 0.3; }
}

/* Eyebrow */
.card-eyebrow {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.card-eyebrow span {
  display: block; width: 24px; height: 2px; background: var(--red);
}
.card-eyebrow p {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 3px; text-transform: uppercase; color: var(--red);
}

.card-title {
  font-family: var(--cond); font-size: 30px; font-weight: 800;
  color: var(--white); letter-spacing: 0.5px; margin-bottom: 32px;
}

/* ─── FIELDS ─── */
.field { margin-bottom: 18px; position: relative; }

.field label {
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: rgba(255,255,255,0.3); margin-bottom: 8px;
}

.field-wrap { position: relative; }

.field input {
  width: 100%; padding: 12px 46px 12px 16px;
  font-family: var(--mono); font-size: 14px; letter-spacing: 1px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; color: var(--white); outline: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
}
.field input::placeholder { color: rgba(255,255,255,0.18); }
.field input:focus {
  border-color: rgba(27,80,160,0.7);
  background: rgba(27,80,160,0.05);
  box-shadow: 0 0 0 3px rgba(27,80,160,0.1);
}
.field input.valid {
  border-color: rgba(34,197,94,0.5);
  background: rgba(34,197,94,0.04);
}
.field input.invalid {
  border-color: rgba(192,39,45,0.6);
  animation: shake 0.35s ease;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60% { transform: translateX(-5px); }
  40%,80% { transform: translateX(5px); }
}

/* Eye toggle (password) */
.eye-btn {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: rgba(255,255,255,0.25); cursor: pointer;
  font-size: 16px; padding: 2px;
  transition: color 0.2s;
}
.eye-btn:hover { color: rgba(255,255,255,0.55); }

/* Caps lock warning */
.caps-warn {
  display: none;
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 1px; color: var(--red-lt);
  margin-top: 5px;
}
.caps-warn.visible { display: block; }

/* ─── ERROR ─── */
#error-msg {
  display: none;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.5px;
  color: var(--red-lt);
  margin-bottom: 18px; padding: 12px 16px;
  background: rgba(192,39,45,0.1);
  border: 1px solid rgba(192,39,45,0.3);
  border-radius: 6px;
  animation: slide-in 0.25s ease;
}
@keyframes slide-in {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Attempt counter */
.attempt-info {
  display: none;
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase;
  color: rgba(255,255,255,0.2); text-align: right;
  margin-top: -10px; margin-bottom: 14px;
}
.attempt-info.visible { display: block; }
.attempt-info.warn { color: var(--red-lt); }

/* ─── LOGIN BUTTON ─── */
.btn-login {
  width: 100%; padding: 14px;
  font-family: var(--cond); font-size: 14px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  background: var(--blue); color: var(--white);
  border: none; border-radius: 6px;
  cursor: pointer; transition: all 0.2s;
  margin-bottom: 28px; position: relative; overflow: hidden;
}
.btn-login::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--blue-lt);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s; z-index: 0;
}
.btn-login:hover::before { transform: scaleX(1); }
.btn-login span { position: relative; z-index: 1; }
.btn-login:active { transform: scale(0.99); }
.btn-login:disabled {
  opacity: 0.5; cursor: not-allowed;
  background: var(--navy-lt);
}
.btn-login:disabled::before { display: none; }

/* Loading spinner in button */
.btn-login.loading span::after {
  content: '';
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: var(--white);
  border-radius: 50%;
  margin-left: 10px;
  vertical-align: middle;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── SUCCESS OVERLAY ─── */
.success-overlay {
  position: absolute; inset: 0;
  background: rgba(34,197,94,0.08);
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  z-index: 20;
}
.success-overlay.show { opacity: 1; pointer-events: all; }
.success-icon {
  font-size: 40px;
  animation: pop 0.4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
.success-text {
  font-family: var(--mono); font-size: 13px;
  letter-spacing: 1px; color: var(--success);
}

/* ─── DIVIDER ─── */
.divider {
  height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 20px;
}

/* ─── NAV BTNS ─── */
.nav-btns { display: flex; gap: 10px; }
.btn-nav {
  flex: 1; padding: 10px;
  font-family: var(--cond); font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  border: 1px solid var(--border);
  background: var(--faint);
  color: rgba(255,255,255,0.35);
  border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.btn-nav:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
  border-color: rgba(255,255,255,0.18);
}

/* ─── FOOTER ─── */
footer {
  position: relative; z-index: 10; text-align: center;
  padding: 14px; font-family: var(--mono); font-size: 10px;
  color: rgba(255,255,255,0.1); letter-spacing: 1px;
  border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
}

/* ═══════════════════════════════
   📱 MOBILE ≤ 768px
═══════════════════════════════ */
@media (max-width: 768px) {
  header { padding: 12px 16px; }
  .header-logo img { height: 28px; }
  .app-name { font-size: 15px; }
  .app-label { font-size: 8px; }

  .center-wrap { padding: 24px 16px; align-items: flex-start; padding-top: 36px; }

  .login-card { max-width: 100%; border-radius: 10px; }
  .card-body { padding: 28px 24px 32px; }

  .card-title { font-size: 26px; }

  .field input { font-size: 16px; /* prevents iOS zoom */ }

  .btn-login { padding: 15px; font-size: 13px; }

  .nav-btns { gap: 8px; }
  .btn-nav { padding: 11px 8px; font-size: 10px; }
}

@media (max-width: 400px) {
  .card-body { padding: 24px 18px 28px; }
}
</style>
</head>
<body>

<div class="glow glow-blue"></div>
<div class="glow glow-red"></div>
<div class="glow glow-center"></div>

<div class="top-bar"></div>

<header>
  <div class="header-logo">
    <img src="images/Hirschmann_Automotive.png" alt="Hirschmann Automotive"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
    <span class="logo-fallback" style="display:none">HIRSCHMANN</span>
  </div>
  <div class="header-meta">
    <div class="app-label">Accès sécurisé</div>
    <div class="app-name">KANBAN SYSTEM</div>
  </div>
</header>

<div class="center-wrap">
  <div class="login-card" style="position:relative;">

    <div class="card-accent"></div>

    <div class="card-body">

      <!-- Badge sécurité -->
      <div class="security-badge">
        <span class="badge-dot"></span>
        Zone sécurisée — Accès restreint
      </div>

      <!-- Eyebrow -->
      <div class="card-eyebrow">
        <span></span>
        <p>Administration</p>
      </div>
      <h1 class="card-title">Connexion Admin</h1>

      <!-- USERNAME -->
      <div class="field">
        <label>
          Nom d'utilisateur
          <span id="user-check" style="opacity:0; color:var(--success)">✓</span>
        </label>
        <div class="field-wrap">
          <input type="text" id="username" placeholder="Identifiant"
                 autocomplete="username" spellcheck="false"
                 oninput="onUserInput()"
                 onkeydown="if(event.key==='Enter') document.getElementById('passcode').focus()">
        </div>
      </div>

      <!-- PASSCODE -->
      <div class="field">
        <label>Passcode</label>
        <div class="field-wrap">
          <input type="password" id="passcode" placeholder="••••••"
                 autocomplete="current-password"
                 oninput="onPassInput()"
                 onkeydown="if(event.key==='Enter') loginAdmin()"
                 onkeyup="checkCapsLock(event)">
          <button class="eye-btn" id="eye-btn" onclick="toggleEye()" tabindex="-1" title="Afficher/masquer">👁</button>
        </div>
        <div class="caps-warn" id="caps-warn">⚠ CAPS LOCK activé</div>
      </div>

      <!-- ERREUR -->
      <div id="error-msg"></div>

      <!-- Tentatives -->
      <div class="attempt-info" id="attempt-info"></div>

      <!-- BOUTON -->
      <button class="btn-login" id="btn-login" onclick="loginAdmin()">
        <span id="btn-text">Connexion</span>
      </button>

      <div class="divider"></div>

      <div class="nav-btns">
        <button class="btn-nav" onclick="window.history.back()">← Précédent</button>
        <button class="btn-nav" onclick="window.location.href='index.html'">⌂ Accueil</button>
      </div>

    </div>

    <!-- SUCCESS OVERLAY -->
    <div class="success-overlay" id="success-overlay">
      <div class="success-icon">✅</div>
      <div class="success-text" id="success-text">Authentifié — Redirection...</div>
    </div>

  </div>
</div>

<footer>© 2026 Hirschmann Automotive — Kanban System v2.0</footer>

<script>
const adminsDB = [
  { username: 'Stidaoui', passcode: '1357' },
  { username: 'admin1',   passcode: '1234' },
  { username: 'admin2',   passcode: '0000' }
];

let attempts   = 0;
const MAX_ATT  = 5;
let lockUntil  = null;
let eyeVisible = false;

// ── CAPS LOCK ────────────────────────────────────
function checkCapsLock(e) {
  const warn = document.getElementById('caps-warn');
  if (e.getModifierState && e.getModifierState('CapsLock')) {
    warn.classList.add('visible');
  } else {
    warn.classList.remove('visible');
  }
}

// ── EYE TOGGLE ───────────────────────────────────
function toggleEye() {
  eyeVisible = !eyeVisible;
  const inp = document.getElementById('passcode');
  inp.type = eyeVisible ? 'text' : 'password';
  document.getElementById('eye-btn').innerText = eyeVisible ? '🙈' : '👁';
}

// ── LIVE VALIDATION ──────────────────────────────
function onUserInput() {
  const val   = document.getElementById('username').value.trim();
  const check = document.getElementById('user-check');
  const inp   = document.getElementById('username');
  const known = adminsDB.some(a => a.username === val);
  inp.classList.toggle('valid', known && val.length > 0);
  check.style.opacity = (known && val.length > 0) ? '1' : '0';
}

function onPassInput() {
  const inp = document.getElementById('passcode');
  inp.classList.remove('invalid');
  clearError();
}

// ── ERROR / CLEAR ────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.style.display = 'block';
  el.innerText = msg;
  // shake inputs
  ['username','passcode'].forEach(id => {
    const inp = document.getElementById(id);
    inp.classList.add('invalid');
    setTimeout(() => inp.classList.remove('invalid'), 500);
  });
}
function clearError() {
  const el = document.getElementById('error-msg');
  el.style.display = 'none';
}

// ── LOCKOUT ──────────────────────────────────────
function isLocked() {
  if (!lockUntil) return false;
  if (Date.now() < lockUntil) return true;
  lockUntil = null; attempts = 0;
  updateAttemptInfo();
  return false;
}

function updateAttemptInfo() {
  const el  = document.getElementById('attempt-info');
  const btn = document.getElementById('btn-login');
  if (attempts === 0) {
    el.className = 'attempt-info'; return;
  }
  const remaining = MAX_ATT - attempts;
  el.className = `attempt-info visible${attempts >= 3 ? ' warn' : ''}`;
  if (isLocked()) {
    const secs = Math.ceil((lockUntil - Date.now()) / 1000);
    el.innerText = `Compte verrouillé — réessayez dans ${secs}s`;
    btn.disabled = true;
    const timer = setInterval(() => {
      if (!isLocked()) {
        clearInterval(timer);
        btn.disabled = false;
        el.className = 'attempt-info';
        clearError();
      } else {
        const s = Math.ceil((lockUntil - Date.now()) / 1000);
        el.innerText = `Compte verrouillé — réessayez dans ${s}s`;
      }
    }, 1000);
  } else {
    el.innerText = `Tentative ${attempts}/${MAX_ATT} — ${remaining} essai${remaining > 1 ? 's' : ''} restant${remaining > 1 ? 's' : ''}`;
  }
}

// ── LOGIN ─────────────────────────────────────────
function loginAdmin() {
  if (isLocked()) return;

  const usernameVal = document.getElementById('username').value.trim();
  const passcodeVal = document.getElementById('passcode').value.trim();
  const btn         = document.getElementById('btn-login');
  const btnText     = document.getElementById('btn-text');

  if (!usernameVal || !passcodeVal) {
    showError('Veuillez remplir tous les champs.');
    return;
  }

  // Loading state
  btn.disabled = true;
  btn.classList.add('loading');
  btnText.innerText = 'Vérification';

  setTimeout(() => {
    btn.classList.remove('loading');
    btn.disabled = false;
    btnText.innerText = 'Connexion';

    const admin = adminsDB.find(a => a.username === usernameVal && a.passcode === passcodeVal);

    if (admin) {
      // SUCCESS
      attempts = 0;
      localStorage.setItem('adminUser', admin.username);
      document.getElementById('success-overlay').classList.add('show');
      document.getElementById('success-text').innerText = `Bienvenue, ${admin.username} — Redirection...`;
      setTimeout(() => window.location.href = 'admin_panel.html', 1200);
    } else {
      // FAIL
      attempts++;
      document.getElementById('passcode').value = '';
      document.getElementById('passcode').focus();

      if (attempts >= MAX_ATT) {
        lockUntil = Date.now() + 30000; // 30s lockout
        showError(`Trop de tentatives — compte verrouillé 30 secondes.`);
      } else {
        showError('Identifiant ou passcode incorrect.');
      }
      updateAttemptInfo();
    }
  }, 600);
}

// ── KEYBOARD ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('username').value = '';
    document.getElementById('passcode').value = '';
    clearError();
    document.getElementById('username').focus();
  }
});

// ── AUTOFOCUS ────────────────────────────────────
window.addEventListener('load', () => {
  document.getElementById('username').focus();
});
</script>

</body>
</html>
