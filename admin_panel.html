<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Hirschmann Automotive</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy:    #0a1f3c;
  --navy-md: #0d2850;
  --blue:    #1a4a8a;
  --red:     #c0272d;
  --red-lt:  #e8454b;
  --white:   #ffffff;
  --gray:    #6b7a8d;
  --success: #27ae60;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  background-color: var(--navy);
  color: var(--white);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* grille de fond */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.018) 60px, rgba(255,255,255,0.018) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.018) 60px, rgba(255,255,255,0.018) 61px);
  pointer-events: none;
  z-index: 0;
}

/* ── BARRE ROUGE ── */
.top-bar {
  height: 5px;
  background: linear-gradient(90deg, var(--red), var(--red-lt), var(--red));
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

/* ── HEADER ── */
header {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 50px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(10,31,60,0.7);
  backdrop-filter: blur(8px);
  flex-shrink: 0;
}

.header-logo img {
  height: 44px;
  filter: brightness(0) invert(1);
  opacity: 0.92;
}

.header-center {
  text-align: center;
}
.header-center .app-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--red);
  font-weight: 600;
}
.header-center .app-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 1px;
}

.btn-logout {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 9px 18px;
  border-radius: 3px;
  border: 1px solid rgba(192,39,45,0.5);
  background: rgba(192,39,45,0.15);
  color: var(--red-lt);
  cursor: pointer;
  transition: 0.2s;
}
.btn-logout:hover { background: rgba(192,39,45,0.3); border-color: var(--red); }

/* ── MAIN ── */
main {
  position: relative;
  z-index: 10;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  padding: 40px 30px 60px;
  flex: 1;
}

/* ── EYEBROW + TITRE ── */
.section-eyebrow {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.section-eyebrow span {
  display: block; width: 28px; height: 2px; background: var(--red);
}
.section-eyebrow p {
  font-size: 10px; letter-spacing: 4px;
  text-transform: uppercase; color: var(--red); font-weight: 600;
}

.page-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 30px; font-weight: 700;
  color: var(--white); margin-bottom: 32px;
}

/* ── AJOUT PART ── */
.add-panel {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 4px;
  padding: 20px 24px;
  margin-bottom: 32px;
}

.add-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  white-space: nowrap;
}

.add-input {
  flex: 1;
  min-width: 200px;
  padding: 11px 16px;
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 3px;
  color: var(--white);
  outline: none;
  transition: border-color 0.2s;
}
.add-input::placeholder { color: rgba(255,255,255,0.2); }
.add-input:focus { border-color: rgba(39,174,96,0.7); }

.btn-add {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 11px 26px;
  border-radius: 3px; border: none;
  background: var(--success);
  color: var(--white);
  cursor: pointer; transition: 0.2s;
  white-space: nowrap;
}
.btn-add:hover { background: #1e8449; }

/* ── KANBAN HEADER ── */
.kanban-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.kanban-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
}
.kanban-count {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; letter-spacing: 2px;
  color: rgba(255,255,255,0.2);
}

/* ── KANBAN GRID ── */
#kanban {
  display: grid;
  grid-template-columns: repeat(5, minmax(160px, 1fr));
  gap: 16px;
  justify-items: center;
}

/* ── BOX ── */
.box {
  width: 100%;
  min-height: 180px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 16px 10px 14px;
  cursor: grab;
  transition: transform 0.2s, border-color 0.2s, background 0.2s;
  position: relative;
  overflow: hidden;
}

/* accent rouge en haut de chaque box */
.box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--blue);
  transition: background 0.2s;
}

.box:hover {
  transform: translateY(-4px);
  border-color: rgba(255,255,255,0.16);
  background: rgba(255,255,255,0.08);
}
.box:hover::before { background: var(--red); }

.box-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: rgba(255,255,255,0.85);
  text-align: center;
  margin-bottom: 12px;
  word-break: break-all;
}

/* QR code style */
.box canvas {
  border-radius: 4px;
  filter: invert(1) brightness(0.85);
  opacity: 0.9;
}

/* ── FOOTER NAV ── */
.footer-nav {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 44px;
  padding-top: 24px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.btn-nav {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 10px 22px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.45);
  cursor: pointer; transition: 0.2s;
}
.btn-nav:hover {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.75);
}

/* ── FOOTER ── */
footer {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 16px;
  font-size: 11px;
  color: rgba(255,255,255,0.12);
  letter-spacing: 1px;
  border-top: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}
</style>
</head>
<body>

<div class="top-bar"></div>

<header>
  <div class="header-logo">
    <img src="images\Hirschmann_Automotive.png" alt="Hirschmann Automotive">
  </div>
  <div class="header-center">
    <div class="app-label">Espace Administrateur</div>
    <div class="app-name">KANBAN SYSTEM</div>
  </div>
  <button class="btn-logout" onclick="logout()">🔓 Déconnexion</button>
</header>

<main>

  <div class="section-eyebrow">
    <span></span>
    <p>Gestion des références</p>
  </div>
  <h1 class="page-title">Admin Panel</h1>

  <!-- AJOUT PART -->
  <div class="add-panel">
    <span class="add-label">Nouveau Part Number</span>
    <input type="text" id="newPart" class="add-input" placeholder="Ex: 812-400-001"
           onkeydown="if(event.key==='Enter') addPart()">
    <button class="btn-add" onclick="addPart()">+ Ajouter</button>
  </div>

  <!-- KANBAN -->
  <div class="kanban-header">
    <span class="kanban-title">Tableau des emplacements</span>
    <span class="kanban-count" id="kanban-count"></span>
  </div>

  <div id="kanban"></div>

  <!-- NAVIGATION -->
  <div class="footer-nav">
    <button class="btn-nav" onclick="goBack()">← Page précédente</button>
    <button class="btn-nav" onclick="goHome()">Page initiale</button>
  </div>

</main>

<footer>© 2026 Hirschmann Automotive — Kanban System</footer>

<script>
let partsDB  = [];
let draggedId = null;

// ══════════════════════════════════════════════════════
// 🔄 CHARGEMENT
// ══════════════════════════════════════════════════════
async function loadParts() {
  try {
    const res = await fetch("http://localhost:3000/getParts");
    partsDB   = await res.json();
    renderKanban();
  } catch(err) {
    console.error(err);
    alert("Backend non connecté !");
  }
}

// ══════════════════════════════════════════════════════
// 🎨 RENDU KANBAN
// ══════════════════════════════════════════════════════
function renderKanban() {
  const kanban = document.getElementById("kanban");
  kanban.innerHTML = "";

  partsDB.sort((a, b) => a.emplacement.localeCompare(b.emplacement));

  document.getElementById("kanban-count").innerText = partsDB.length + " références";

  partsDB.forEach(part => {
    const div = document.createElement("div");
    div.className  = "box";
    div.dataset.id = part.id;
    div.draggable  = true;

    // label
    const label = document.createElement("div");
    label.className = "box-label";
    label.innerText = part.part_number;
    div.appendChild(label);

    // QR Code auto
    const qrCanvas = document.createElement("canvas");
    qrCanvas.id = `qr-${part.id}`;
    div.appendChild(qrCanvas);
    QRCode.toCanvas(qrCanvas, part.part_number, { width: 120 }, err => {
      if (err) console.error(err);
    });

    // DRAG
    div.addEventListener("dragstart", () => { draggedId = part.id; });
    div.addEventListener("dragover",  e  => e.preventDefault());
    div.addEventListener("drop", async e => {
      e.preventDefault();
      if (draggedId === part.id) return;
      const dragged   = partsDB.find(p => p.id == draggedId);
      const target    = partsDB.find(p => p.id == part.id);
      const tempPlace = dragged.emplacement;
      await updatePart(dragged.id, dragged.part_number, target.emplacement);
      await updatePart(target.id,  target.part_number,  tempPlace);
      await loadParts();
    });

    // DOUBLE CLICK → modifier / supprimer
    div.addEventListener("dblclick", async () => {
      const action = prompt("1 : Modifier\n2 : Supprimer", "1");
      if (action === "1") {
        const newPart = prompt("Nouveau Part Number :", part.part_number);
        if (newPart) { await updatePart(part.id, newPart, part.emplacement); loadParts(); }
      }
      if (action === "2") {
        if (confirm("Supprimer ce Part Number ?")) { await deletePart(part.id); loadParts(); }
      }
    });

    kanban.appendChild(div);
  });
}

// ══════════════════════════════════════════════════════
// CRUD
// ══════════════════════════════════════════════════════
async function addPart() {
  const part = document.getElementById("newPart").value.trim();
  if (!part) { alert("Entrer un Part Number"); return; }
  try {
    await fetch("http://localhost:3000/addPart", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ part_number: part, emplacement: "CASE_" + Date.now() })
    });
    document.getElementById("newPart").value = "";
    await loadParts();
  } catch(err) { console.error(err); alert("Erreur ajout !"); }
}

async function updatePart(id, part, place) {
  await fetch(`http://localhost:3000/updatePart/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ part_number: part, emplacement: place })
  });
}

async function deletePart(id) {
  await fetch(`http://localhost:3000/deletePart/${id}`, { method: "DELETE" });
}

// ══════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════
function goBack() { window.history.back(); }
function goHome() { window.location.href = "index.html"; }
function logout() {
  if (confirm("Voulez-vous vraiment vous déconnecter ?")) {
    sessionStorage.clear();
    localStorage.removeItem("adminToken");
    window.location.href = "admin_login.html";
  }
}

loadParts();
</script>

</body>
</html>
